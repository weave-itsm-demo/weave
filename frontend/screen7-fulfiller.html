<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weave — Fulfiller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1b2a;
      --sidebar-bg:  #0b1825;
      --card:        #1a2d42;
      --bubble-bot:  #162030;
      --bubble-user: #1a2d42;
      --input-bg:    #0f2030;
      --border:      #1c3347;
      --border-light:#243f57;
      --accent:      #00ff88;
      --accent-dim:  rgba(0,255,136,0.10);
      --text:        #f0f4f8;
      --text-sub:    #8fa8be;
      --text-muted:  #4a6a82;
      --form-input:  #1e3448;
    }

    html, body { height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

    /* ── Nav ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      height: 52px; padding: 0 20px;
      background: rgba(13,27,42,0.96); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px); position: relative; z-index: 100; flex-shrink: 0;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-size: 15px; font-weight: 700; }
    .nav-brand:hover { color: var(--accent); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--text-sub); text-decoration: none; transition: background 0.15s, color 0.15s; }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .nav-link.active { background: var(--accent-dim); color: var(--accent); }

    /* ── Layout ── */
    .layout { display: flex; height: calc(100vh - 52px); overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 16px 16px 10px; flex-shrink: 0; }
    .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 4px 8px 16px; }
    .wf-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; border: 1px solid transparent; }
    .wf-row:hover { background: rgba(255,255,255,0.05); }
    .wf-row.active { background: var(--accent-dim); border-color: rgba(0,255,136,0.2); }
    .wf-row-icon { font-size: 14px; flex-shrink: 0; width: 28px; height: 28px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .wf-row-name { flex: 1; font-size: 12.5px; font-weight: 500; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .wf-row.active .wf-row-name { color: var(--accent); }
    .wf-row:hover .wf-row-name { color: var(--text); }
    .sidebar-empty { padding: 20px 16px; font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.6; }

    /* ── Chat area ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: rgba(11,24,37,0.6); }
    .chat-title { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .chat-subtitle { font-size: 11.5px; color: var(--text-muted); }
    .online-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Message rows ── */
    .msg-row { display: flex; align-items: flex-end; gap: 10px; animation: msgIn 0.2s ease forwards; }
    .msg-row.msg-user { flex-direction: row-reverse; }
    @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .msg-avatar { width: 30px; height: 30px; flex-shrink: 0; background: var(--accent-dim); border: 1px solid rgba(0,255,136,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--accent); font-weight: 700; margin-bottom: 2px; }
    .msg-bubble { max-width: 74%; padding: 11px 15px; font-size: 13.5px; line-height: 1.65; word-wrap: break-word; }
    .msg-bubble-bot { background: var(--bubble-bot); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; color: var(--text); }
    .msg-bubble-user { background: var(--bubble-user); border: 1px solid var(--border-light); border-radius: 16px 16px 4px 16px; color: var(--text); }

    /* Typing dots */
    .typing-dots { display: flex; align-items: center; gap: 5px; padding: 4px 2px; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.3s infinite; display: inline-block; }
    .typing-dots span:nth-child(2){animation-delay:0.18s} .typing-dots span:nth-child(3){animation-delay:0.36s}
    @keyframes bounce { 0%,80%,100%{transform:scale(0.75);opacity:0.5} 40%{transform:scale(1.1);opacity:1} }

    /* ── Dynamic inline form ── */
    .inline-form { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label { font-size: 11.5px; font-weight: 600; color: var(--text-sub); }
    .form-field label .req { color: var(--accent); margin-left: 2px; }
    .form-field input, .form-field select, .form-field textarea {
      background: var(--form-input); border: 1px solid var(--border-light); border-radius: 7px;
      color: var(--text); font-size: 13px; font-family: inherit; padding: 9px 12px;
      outline: none; width: 100%; transition: border-color 0.15s;
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
    .form-field input::placeholder, .form-field textarea::placeholder { color: var(--text-muted); }
    .form-field input.invalid, .form-field textarea.invalid { border-color: #f87171 !important; }
    .form-field textarea { resize: vertical; min-height: 60px; }
    .form-submit-btn { width: 100%; padding: 10px; background: var(--accent); color: #081520; border: none; border-radius: 8px; font-size: 13.5px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; transition: background 0.15s; }
    .form-submit-btn:hover { background: #00e87c; }
    .form-submit-btn:disabled { opacity: 0.55; cursor: default; }

    /* ── Input bar ── */
    .input-bar { flex-shrink: 0; padding: 14px 20px; border-top: 1px solid var(--border); background: rgba(11,24,37,0.7); display: flex; align-items: center; gap: 10px; }
    .chat-input { flex: 1; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 24px; color: var(--text); font-size: 13.5px; font-family: inherit; padding: 10px 18px; outline: none; transition: border-color 0.15s; }
    .chat-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .chat-input::placeholder { color: var(--text-muted); }
    .send-btn { width: 42px; height: 42px; flex-shrink: 0; background: var(--accent); color: #081520; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s, transform 0.1s; font-size: 16px; }
    .send-btn:hover { background: #00e87c; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    /* ── Execution panel ── */
    .exec-panel { width: 300px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--sidebar-bg); display: flex; flex-direction: column; overflow: hidden; }
    .exec-panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
    .exec-panel-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .exec-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .exec-badge.running { background: var(--accent-dim); color: var(--accent); animation: badgePulse 2s ease-in-out infinite; }
    .exec-badge.complete { background: var(--accent-dim); color: var(--accent); }
    .exec-badge.error { background: rgba(248,113,113,0.15); color: #f87171; }
    @keyframes badgePulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .exec-panel-body { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }

    .exec-idle { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 14px; }
    .exec-idle-icon { width: 52px; height: 52px; background: rgba(255,255,255,0.04); border: 1px solid var(--border-light); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .exec-idle p { font-size: 12px; color: var(--text-muted); line-height: 1.6; max-width: 180px; }

    /* Step rows */
    .exec-wf-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .exec-progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .exec-progress-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); }
    .exec-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
    .exec-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
    .exec-bar-fill.running { animation: barGlow 1.4s ease-in-out infinite alternate; }
    @keyframes barGlow { from{box-shadow:0 0 4px rgba(0,255,136,0.3)} to{box-shadow:0 0 10px rgba(0,255,136,0.7);filter:brightness(1.2)} }

    .exec-step { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 2px; border: 1px solid transparent; transition: all 0.2s; }
    .exec-step.pending { opacity: 0.3; }
    .exec-step.active { background: rgba(0,255,136,0.06); border-color: rgba(0,255,136,0.15); border-left: 3px solid var(--accent); }
    .exec-step.done { background: transparent; }
    .exec-step.error-step { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.2); }

    .exec-step-icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .exec-step-icon.pending { background: var(--border); color: var(--text-muted); }
    .exec-step-icon.active  { background: var(--accent-dim); border: 1.5px solid var(--accent); color: var(--accent); }
    .exec-step-icon.done    { background: var(--accent); color: var(--bg); }
    .exec-step-icon.error   { background: rgba(248,113,113,0.2); color: #f87171; }

    .exec-step-body { flex: 1; min-width: 0; }
    .exec-step-title { font-size: 12px; font-weight: 600; color: var(--text); }
    .exec-step-log { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .exec-step-time { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-muted); flex-shrink: 0; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin { display: inline-block; width: 10px; height: 10px; border: 1.5px solid rgba(0,255,136,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }

    /* Result card */
    .result-card { margin-top: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; animation: msgIn 0.25s ease forwards; }
    .result-card-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .result-section { margin-bottom: 10px; }
    .result-section-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 5px; }
    .result-text { font-size: 12px; color: var(--text-sub); line-height: 1.6; }
    .result-item { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; color: var(--text-sub); padding: 3px 0; }
    .result-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }
    .result-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* Panel divider */
    .panel-divider { width: 4px; flex-shrink: 0; background: var(--border); cursor: col-resize; transition: background 0.15s; }
    .panel-divider:hover, .panel-divider.dragging { background: var(--accent); }
  </style>
</head>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <p class="sidebar-label">Published Workflows</p>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <p class="sidebar-empty">Loading…</p>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-header">
      <div>
        <div class="chat-title" id="chat-title">Workflow Assistant</div>
        <div class="chat-subtitle" id="chat-subtitle">Select a workflow to get started</div>
      </div>
      <div class="online-badge">
        <span class="online-dot"></span>
        Online
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-bar">
      <input type="text" class="chat-input" id="chat-input" placeholder="Type a message or select a workflow…" autocomplete="off">
      <button class="send-btn" id="send-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="panel-divider" id="panel-divider"></div>

  <!-- Execution panel -->
  <aside class="exec-panel" id="exec-panel">
    <div class="exec-panel-header">
      <span class="exec-panel-title">Execution</span>
      <span class="exec-badge" id="exec-badge" style="display:none"></span>
    </div>
    <div class="exec-panel-body" id="exec-panel-body">
      <div class="exec-idle" id="exec-idle">
        <div class="exec-idle-icon">⚡</div>
        <p>Select a workflow from the sidebar and provide inputs to run it.</p>
      </div>
      <div id="exec-running" style="display:none"></div>
    </div>
  </aside>

</div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let activeWorkflow = null;
let isBotTyping    = false;
let execWs         = null;
let execTotal      = 0;
let execDone       = 0;
let formCounter    = 0;

// ══════════════════════════════════════════════
// INPUT INFERENCE
// Determines what fields to ask for based on
// workflow name and step titles.
// ══════════════════════════════════════════════
function inferInputs(workflow) {
  // Use explicit inputs field if defined
  if (workflow.inputs && workflow.inputs.length) return workflow.inputs;

  const name  = (workflow.workflow_name || workflow.name || '').toLowerCase();
  const steps = (workflow.steps || []).map(s => (s.title || '').toLowerCase()).join(' ');
  const all   = name + ' ' + steps;

  if (all.includes('github') || all.includes('issue') || all.includes('incident') || all.includes('triage')) {
    return [{ key: 'issue_number', label: 'GitHub Issue Number', type: 'text', placeholder: 'e.g. 42', required: true }];
  }
  if (all.includes('vendor') || all.includes('onboard') || all.includes('supplier')) {
    return [
      { key: 'company',  label: 'Company Name',         type: 'text',  placeholder: 'e.g. Acme Corp',    required: true },
      { key: 'country',  label: 'Country',              type: 'text',  placeholder: 'e.g. United States', required: true },
      { key: 'industry', label: 'Industry',             type: 'text',  placeholder: 'e.g. Technology',    required: false },
      { key: 'email',    label: 'Vendor Contact Email', type: 'email', placeholder: 'vendor@company.com', required: false },
    ];
  }
  if (all.includes('change') || all.includes('deploy') || all.includes('release')) {
    return [{ key: 'change_id', label: 'Change Request ID', type: 'text', placeholder: 'e.g. CHG0012345', required: true }];
  }
  if (all.includes('user') || all.includes('access') || all.includes('provision')) {
    return [
      { key: 'username', label: 'Username / Email',   type: 'text', placeholder: 'e.g. john.doe@company.com', required: true },
      { key: 'role',     label: 'Role / Access Level',type: 'text', placeholder: 'e.g. Developer',            required: false },
    ];
  }
  if (all.includes('security') || all.includes('alert') || all.includes('threat')) {
    return [{ key: 'alert_id', label: 'Alert / Ticket ID', type: 'text', placeholder: 'e.g. SEC-1234', required: true }];
  }
  // Generic fallback
  return [{ key: 'details', label: 'Describe the request', type: 'textarea', placeholder: 'Provide details to run this workflow…', required: true }];
}

// ══════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════
async function loadSidebar() {
  try {
    const res  = await fetch('/api/workflows/published');
    const data = await res.json();
    const wfs  = data.workflows || [];
    const el   = document.getElementById('sidebar-list');

    if (!wfs.length) {
      el.innerHTML = '<p class="sidebar-empty">No published workflows yet.<br>Publish one from the Library screen.</p>';
      return;
    }

    // Deduplicate by name — keep latest
    const seen = new Map();
    wfs.forEach(w => {
      const key = (w.workflow_name || w.name || '').trim();
      if (!seen.has(key) || (w.updated_at || '') > (seen.get(key).updated_at || ''))
        seen.set(key, w);
    });

    el.innerHTML = '';
    seen.forEach(w => {
      const name = w.workflow_name || w.name || 'Unnamed';
      const row  = document.createElement('div');
      row.className = 'wf-row';
      row.innerHTML = `
        <div class="wf-row-icon">${guessIcon(name)}</div>
        <div class="wf-row-name" title="${esc(name)}">${esc(name)}</div>
      `;
      row.addEventListener('click', () => selectWorkflow(w, row));
      el.appendChild(row);
    });
  } catch (e) {
    document.getElementById('sidebar-list').innerHTML = '<p class="sidebar-empty">Failed to load workflows.</p>';
  }
}

function guessIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('incident') || n.includes('triage'))  return '🚨';
  if (n.includes('vendor')   || n.includes('onboard')) return '🏢';
  if (n.includes('change')   || n.includes('deploy'))  return '🔄';
  if (n.includes('user')     || n.includes('access'))  return '👤';
  if (n.includes('security') || n.includes('alert'))   return '🔒';
  if (n.includes('monitor'))                           return '📡';
  return '⚡';
}

// ══════════════════════════════════════════════
// WORKFLOW SELECTION
// ══════════════════════════════════════════════
function selectWorkflow(workflow, rowEl) {
  document.querySelectorAll('.wf-row').forEach(r => r.classList.remove('active'));
  rowEl.classList.add('active');
  activeWorkflow = workflow;

  const name   = workflow.workflow_name || workflow.name || 'Workflow';
  const inputs = inferInputs(workflow);
  const steps  = (workflow.steps || []).length;

  document.getElementById('chat-title').textContent    = name;
  document.getElementById('chat-subtitle').textContent = `${steps} step${steps !== 1 ? 's' : ''} · Published`;

  const fieldList = inputs.map(f => `<strong>${esc(f.label)}</strong>`).join(', ');
  addBotMessage(
    `I'll run <strong>${esc(name)}</strong> for you.\n\nPlease provide: ${fieldList}`,
    buildForm(inputs),
    true
  );
}

// ══════════════════════════════════════════════
// DYNAMIC FORM BUILDER
// ══════════════════════════════════════════════
function buildForm(inputs) {
  const fid    = `form-${++formCounter}`;
  const fields = inputs.map(f => {
    const req = f.required ? '<span class="req">*</span>' : '';
    if (f.type === 'textarea') {
      return `<div class="form-field">
        <label>${esc(f.label)}${req}</label>
        <textarea id="${fid}-${f.key}" placeholder="${esc(f.placeholder || '')}"></textarea>
      </div>`;
    }
    return `<div class="form-field">
      <label>${esc(f.label)}${req}</label>
      <input type="${esc(f.type || 'text')}" id="${fid}-${f.key}" placeholder="${esc(f.placeholder || '')}">
    </div>`;
  }).join('');

  const name = activeWorkflow ? (activeWorkflow.workflow_name || activeWorkflow.name || 'Workflow') : 'Workflow';
  return `<div class="inline-form" id="${fid}">
    ${fields}
    <button class="form-submit-btn" id="${fid}-btn" onclick="submitForm('${fid}')">
      ▶ Run ${esc(name)}
    </button>
  </div>`;
}

function submitForm(fid) {
  if (!activeWorkflow) return;
  const inputs = inferInputs(activeWorkflow);
  const values = {};
  let hasErr   = false;

  inputs.forEach(f => {
    const el  = document.getElementById(`${fid}-${f.key}`);
    if (!el) return;
    const val = el.value.trim();
    if (f.required && !val) {
      el.classList.add('invalid');
      setTimeout(() => el.classList.remove('invalid'), 2000);
      hasErr = true;
    } else {
      values[f.key] = val;
    }
  });
  if (hasErr) return;

  // Lock form
  document.getElementById(fid).querySelectorAll('input,textarea').forEach(el => el.disabled = true);
  const btn = document.getElementById(`${fid}-btn`);
  btn.disabled = true; btn.textContent = 'Starting…';

  const summary = inputs.filter(f => values[f.key]).map(f => `${f.label}: ${values[f.key]}`).join(' · ');
  addUserMessage(summary);
  runWorkflow(activeWorkflow, values);
}

// ══════════════════════════════════════════════
// FREE-TEXT CHAT
// ══════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || isBotTyping) return;
  input.value = '';
  addUserMessage(text);
  showTyping();
  setTimeout(() => {
    hideTyping();
    addBotMessage('Please select a workflow from the sidebar to get started. I\'ll then ask for the details needed to run it.');
  }, 600);
}

// ══════════════════════════════════════════════
// WORKFLOW EXECUTION via WebSocket
// ══════════════════════════════════════════════
function runWorkflow(workflow, values) {
  const wfId  = workflow.id || workflow.workflow_id;
  const name  = workflow.workflow_name || workflow.name || 'Workflow';
  const steps = workflow.steps || [];
  execTotal   = steps.length;
  execDone    = 0;

  // Build query params — issue number gets special treatment
  const params = new URLSearchParams();
  if (values.issue_number) params.set('issue', values.issue_number);
  params.set('inputs', JSON.stringify(values));

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${location.host}/ws/execute/${wfId}?${params}`;

  showExecPanel(name, steps);
  addBotMessage(`Running <strong>${esc(name)}</strong>… Watch the execution panel for live progress.`, '', true);

  if (execWs) { try { execWs.close(); } catch(e){} }
  execWs = new WebSocket(wsUrl);

  execWs.onmessage = e => {
    try { handleWsEvent(JSON.parse(e.data), steps); } catch(err) {}
  };
  execWs.onerror = () => {
    setExecBadge('error', 'ERROR');
    addBotMessage('⚠ Connection error. Please try again.');
  };
  execWs.onclose = () => {
    document.getElementById('exec-bar-fill')?.classList.remove('running');
  };
}

function handleWsEvent(ev, steps) {
  const body = document.getElementById('exec-panel-body');
  switch (ev.type) {
    case 'step_start':
      activateStep(ev.step_index ?? 0, ev.title || '');
      break;
    case 'step_log':
      updateStepLog(ev.step_index ?? 0, ev.message || '');
      if (body) body.scrollTop = body.scrollHeight;
      break;
    case 'step_done':
      completeStep(ev.step_index ?? 0, ev.duration_ms ? `${(ev.duration_ms/1000).toFixed(1)}s` : '');
      execDone++; updateProgress();
      if (body) body.scrollTop = body.scrollHeight;
      break;
    case 'step_error':
      errorStep(ev.step_index ?? 0, ev.error || '');
      execDone++; updateProgress();
      break;
    case 'workflow_done':
      setExecBadge('complete', 'COMPLETE');
      document.getElementById('exec-bar-fill')?.classList.remove('running');
      showResult(ev);
      break;
    case 'error':
      setExecBadge('error', 'ERROR');
      addBotMessage(`⚠ ${ev.message || 'Workflow error'}`);
      break;
  }
}

// ══════════════════════════════════════════════
// EXECUTION PANEL
// ══════════════════════════════════════════════
function showExecPanel(name, steps) {
  document.getElementById('exec-idle').style.display = 'none';
  const runEl = document.getElementById('exec-running');
  runEl.style.display = '';
  setExecBadge('running', 'RUNNING');

  runEl.innerHTML = `
    <div class="exec-wf-name">${esc(name)}</div>
    <div class="exec-progress-row">
      <span class="exec-progress-label" id="exec-prog-label">0 / ${steps.length} steps</span>
    </div>
    <div class="exec-bar"><div class="exec-bar-fill running" id="exec-bar-fill" style="width:0%"></div></div>
    <div id="exec-steps-list">
      ${steps.map((s, i) => `
        <div class="exec-step pending" id="estep-${i}">
          <div class="exec-step-icon pending" id="estep-icon-${i}">${i+1}</div>
          <div class="exec-step-body">
            <div class="exec-step-title">${esc(s.title || `Step ${i+1}`)}</div>
            <div class="exec-step-log" id="estep-log-${i}"></div>
          </div>
          <div class="exec-step-time" id="estep-time-${i}"></div>
        </div>`).join('')}
    </div>
    <div id="exec-result"></div>`;
}

function activateStep(i) {
  const el   = document.getElementById(`estep-${i}`);
  const icon = document.getElementById(`estep-icon-${i}`);
  if (!el) return;
  el.className   = 'exec-step active';
  icon.className = 'exec-step-icon active';
  icon.innerHTML = '<span class="spin"></span>';
}

function updateStepLog(i, msg) {
  const el = document.getElementById(`estep-log-${i}`);
  if (el) el.textContent = msg.slice(0, 80);
}

function completeStep(i, elapsed) {
  const el   = document.getElementById(`estep-${i}`);
  const icon = document.getElementById(`estep-icon-${i}`);
  const time = document.getElementById(`estep-time-${i}`);
  const log  = document.getElementById(`estep-log-${i}`);
  if (!el) return;
  el.className     = 'exec-step done';
  icon.className   = 'exec-step-icon done';
  icon.textContent = '✓';
  if (time) time.textContent = elapsed;
  if (log)  log.textContent  = '';
}

function errorStep(i) {
  const el   = document.getElementById(`estep-${i}`);
  const icon = document.getElementById(`estep-icon-${i}`);
  if (!el) return;
  el.className     = 'exec-step error-step';
  icon.className   = 'exec-step-icon error';
  icon.textContent = '✕';
}

function updateProgress() {
  const bar   = document.getElementById('exec-bar-fill');
  const label = document.getElementById('exec-prog-label');
  if (bar)   bar.style.width   = `${(execDone / execTotal) * 100}%`;
  if (label) label.textContent = `${execDone} / ${execTotal} steps`;
}

function showResult(ev) {
  const el = document.getElementById('exec-result');
  if (!el) return;
  const briefing    = ev.briefing    || '';
  const actionItems = ev.action_items || [];
  const escalations = ev.escalations  || [];

  el.innerHTML = `
    <div class="result-card">
      <div class="result-card-title">Workflow Complete</div>
      ${briefing ? `<div class="result-section">
        <span class="result-section-label">Summary</span>
        <div class="result-text">${esc(briefing)}</div>
      </div>` : ''}
      ${actionItems.length ? `<hr class="result-divider"><div class="result-section">
        <span class="result-section-label">Action Items</span>
        ${actionItems.map(a => `<div class="result-item"><span class="result-dot"></span><span>${esc(String(a))}</span></div>`).join('')}
      </div>` : ''}
      ${escalations.length ? `<hr class="result-divider"><div class="result-section">
        <span class="result-section-label">Escalations</span>
        ${escalations.map(e => `<div class="result-item"><span class="result-dot" style="background:#f5a623"></span><span>${esc(String(e))}</span></div>`).join('')}
      </div>` : ''}
    </div>`;

  document.getElementById('exec-panel-body').scrollTop = 99999;

  let msg = 'Workflow complete.';
  if (briefing)          msg += `\n\n${briefing}`;
  if (actionItems.length) msg += `\n\n**${actionItems.length} action item${actionItems.length > 1 ? 's' : ''} generated.**`;
  addBotMessage(msg);
}

function setExecBadge(cls, text) {
  const el = document.getElementById('exec-badge');
  el.style.display = ''; el.className = `exec-badge ${cls}`; el.textContent = text;
}

// ══════════════════════════════════════════════
// MESSAGES
// ══════════════════════════════════════════════
function addBotMessage(text, extraHtml = '', isHtml = false) {
  const row = document.createElement('div');
  row.className = 'msg-row msg-bot';
  const content = isHtml ? text : fmt(text);
  row.innerHTML = `
    <div class="msg-avatar">∞</div>
    <div class="msg-bubble msg-bubble-bot">
      <div>${content}</div>
      ${extraHtml}
    </div>`;
  document.getElementById('messages').appendChild(row);
  scrollBottom();
}

function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row msg-user';
  row.innerHTML = `<div class="msg-bubble msg-bubble-user">${esc(text)}</div>`;
  document.getElementById('messages').appendChild(row);
  scrollBottom();
}

function showTyping() {
  isBotTyping = true;
  const row = document.createElement('div');
  row.className = 'msg-row msg-bot'; row.id = 'typing-row';
  row.innerHTML = `<div class="msg-avatar">∞</div><div class="msg-bubble msg-bubble-bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(row);
  scrollBottom();
}

function hideTyping() {
  isBotTyping = false;
  document.getElementById('typing-row')?.remove();
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function scrollBottom() {
  const el = document.getElementById('messages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(text) {
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

// ══════════════════════════════════════════════
// RESIZABLE DIVIDER
// ══════════════════════════════════════════════
(function() {
  const div  = document.getElementById('panel-divider');
  const chat = div?.previousElementSibling;
  const exec = div?.nextElementSibling;
  if (!div || !chat || !exec) return;
  let drag = false, sx = 0, scw = 0, sew = 0;
  div.addEventListener('mousedown', e => {
    drag = true; sx = e.clientX;
    scw = chat.getBoundingClientRect().width;
    sew = exec.getBoundingClientRect().width;
    div.classList.add('dragging');
    document.body.style.cssText += 'cursor:col-resize;user-select:none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const dx = e.clientX - sx;
    chat.style.flex = 'none'; chat.style.width = Math.max(300, scw + dx) + 'px';
    exec.style.width = Math.max(200, sew - dx) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!drag) return; drag = false;
    div.classList.remove('dragging');
    document.body.style.cursor = document.body.style.userSelect = '';
  });
})();

// ══════════════════════════════════════════════
// EVENTS + INIT
// ══════════════════════════════════════════════
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

loadSidebar();
addBotMessage('👋 Hello! Select a workflow from the sidebar and I\'ll ask you for what I need to run it.');
</script>
</body>
